version: '3.8'

services:
  chattts-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: chattts:gpu
    container_name: chattts-gpu
    restart: unless-stopped
    
    # GPU 配置
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all  # 使用所有 GPU，可改为 1 或 2 指定数量
              capabilities: [gpu]
    
    # 端口映射
    ports:
      - "9000:9000"
    
    # 数据卷挂载
    volumes:
      # 模型缓存目录（使用宿主机的模型目录）
      # Windows 路径格式: D:\code\education\models\huggingface_cache
      # 映射到容器内: /app/.cache/huggingface
      - D:/code/education/models/huggingface_cache:/app/.cache/huggingface:ro
      # 可选：挂载自定义音色文件
      # - ./custom_voices:/app/voice_template
    
    # 环境变量
    environment:
      # === 强制离线模式（断网环境必需）===
      - HF_DATASETS_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_OFFLINE=1
      - HF_UPDATE_DOWNLOAD_COUNTS=false
      
      # === HuggingFace 配置 ===
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
      - HF_ENDPOINT=https://hf-mirror.com
      
      # GPU 配置
      - CUDA_VISIBLE_DEVICES=0  # 指定使用的 GPU，0,1 表示使用前两块
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - CUDA_LAUNCH_BLOCKING=0
      
      # 性能优化
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=8
      
      # Python 配置
      - PYTHONUNBUFFERED=1
    
    # 共享内存（用于 GPU 通信）
    shm_size: 2gb
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

# 可选：添加其他服务（如 Ollama）
