# Nginx 反向代理配置
# 统一入口，自动路由到各个服务

upstream fastapi_backend {
    server backend:8000;
}

upstream chatvrm_frontend {
    server chatvrm:3001;
}

upstream graphrag_frontend {
    server graphrag-visualizer:3000;
}

server {
    listen 80;
    server_name localhost;

    # 根路径重定向到ChatVRM
    location = / {
        return 302 /chat;
    }

    # ChatVRM 对话界面（心灵助手）
    location /chat {
        proxy_pass http://chatvrm_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ChatVRM Next.js 静态资源（_next/static 等）
    location /_next {
        proxy_pass http://chatvrm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphRAG 可视化
    location /graph {
        proxy_pass http://graphrag_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI 后端API
    location /api {
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 支持
    location /api/v1/ws {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # FastAPI 静态文件（登录页等）
    location /static {
        proxy_pass http://fastapi_backend;
    }

    # FastAPI 文档
    location /docs {
        proxy_pass http://fastapi_backend;
    }
}

