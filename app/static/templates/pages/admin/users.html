<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>rag+知识图谱本科智慧教学系统</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="robots" content="all,follow">
    <link rel="stylesheet" href="/assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/css/style.default.css" id="theme-stylesheet">
    <style>
      .alert {
        display: none;
        margin-top: 10px;
      }
      .loading {
        display: none;
      }
      .user-table {
        margin-top: 20px;
      }
      .logout-btn {
        float: right;
        margin-top: 10px;
      }
      .user-info {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
      }
      .table th {
        background-color: #f8f9fa;
        border-top: none;
      }
      .btn-sm {
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="container-fluid">
        <div class="row">
          <div class="col-lg-12">
            <div class="card">
              <div class="card-header">
                <h4>rag+知识图谱本科智慧教学系统</h4>
                <div class="float-right">
                  <a href="/chat" class="btn btn-primary me-2">智能问答</a>
                  <button class="btn btn-danger" id="logoutBtn">退出登录</button>
                </div>
              </div>
              <div class="card-body">
                <!-- 成功提示 -->
                <div class="alert alert-success" id="successAlert" role="alert">
                  <span id="successMessage"></span>
                </div>

                <!-- 错误提示 -->
                <div class="alert alert-danger" id="errorAlert" role="alert">
                  <span id="errorMessage"></span>
                </div>

                <!-- 当前用户信息 -->
                <div class="user-info" id="currentUserInfo">
                  <h5>当前用户信息</h5>
                  <p id="userInfoText">加载中...</p>
                </div>

                <!-- 用户列表 -->
                <div class="user-table">
                  <h5>用户列表</h5>
                  <div class="table-responsive">
                    <table class="table table-striped">
                      <thead>
                        <tr>
                          <th>ID</th>
                          <th>用户名</th>
                          <th>真实姓名</th>
                          <th>邮箱</th>
                          <th>创建时间</th>
                          <th>操作</th>
                        </tr>
                      </thead>
                      <tbody id="userTableBody">
                        <tr>
                          <td colspan="6" class="text-center">
                            <span class="loading">加载中...</span>
                            <span class="normal">暂无数据</span>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- JavaScript files-->
    <script src="/assets/vendor/jquery/jquery.min.js"></script>
    <script src="/assets/vendor/jquery/jquery.cookie.min.js"></script>
    <script src="/assets/vendor/bootstrap/bootstrap.min.js"></script>
    <script src="/assets/vendor/jquery-validation/jquery.validate.min.js"></script><!--表单验证-->
    <!-- Main File-->
    <script src="/assets/js/front.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/api.js"></script>
    <script>
      // 使用配置文件中的API地址
      const API_BASE_URL = window.API_CONFIG ? window.API_CONFIG.BASE_URL : 'http://127.0.0.1:8000';

      $(function(){
        // 检查用户是否已登录
        checkAuth();

        // 加载用户列表
        loadUserList();

        // 退出登录
        $("#logoutBtn").click(function(){
          logout();
        });
      });

      // 检查用户认证状态
      function checkAuth() {
        var token = localStorage.getItem("userToken");
        var userInfo = localStorage.getItem("userInfo");

        if(!token || !userInfo) {
          showError("请先登录");
          setTimeout(function() {
            window.location.href = "login.html";
          }, 1500);
          return;
        }

        // 显示当前用户信息
        try {
          var user = JSON.parse(userInfo);
          $("#userInfoText").html(`
            <strong>用户名:</strong> ${user.username}<br>
            <strong>真实姓名:</strong> ${user.name}<br>
            <strong>邮箱:</strong> ${user.email}
          `);
        } catch(e) {
          console.error("解析用户信息失败:", e);
        }
      }

      // 加载用户列表
      function loadUserList() {
        var token = localStorage.getItem("userToken");

        if(!token) {
          showError("未找到用户token，请重新登录");
          return;
        }

        console.log("Token:", token); // 调试信息

        // 显示加载状态
        showTableLoading(true);

                $.ajax({
          type: "GET",
          url: API_BASE_URL + "/api/v1/auth/listUser",
          headers: {
             "Authorization": "Bearer " + token
          },
          success: function(response) {
            showTableLoading(false);

            if(response && response.length >= 0) {
              // 加载成功
              renderUserTable(response);
            } else {
              // 加载失败
              showError("获取用户列表失败");
            }
          },
          error: function(xhr, status, error) {
            showTableLoading(false);
            showError("网络错误，请检查网络连接");
            console.error("获取用户列表失败:", error);
          }
        });
      }

      // 渲染用户表格
      function renderUserTable(users) {
        var tbody = $("#userTableBody");
        tbody.empty();

        if(users && users.length > 0) {
          users.forEach(function(user) {
            var row = `
              <tr>
                <td>${user.id || '-'}</td>
                <td>${user.username || '-'}</td>
                <td>${user.name || '-'}</td>
                <td>${user.email || '-'}</td>
                <td>${user.created_at || '-'}</td>
                <td>
                  <button class="btn btn-sm btn-info" onclick="viewUser(${user.id})">查看</button>
                  <button class="btn btn-sm btn-warning" onclick="editUser(${user.id})">编辑</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">删除</button>
                </td>
              </tr>
            `;
            tbody.append(row);
          });
        } else {
          tbody.html('<tr><td colspan="6" class="text-center">暂无用户数据</td></tr>');
        }
      }

      // 显示表格加载状态
      function showTableLoading(show) {
        if(show) {
          $(".loading").show();
          $(".normal").hide();
        } else {
          $(".loading").hide();
          $(".normal").show();
        }
      }

      // 查看用户详情
      function viewUser(userId) {
        alert("查看用户ID: " + userId + " 的详细信息");
        // 这里可以添加查看用户详情的逻辑
      }

      // 编辑用户信息
      function editUser(userId) {
        alert("编辑用户ID: " + userId + " 的信息");
        // 这里可以添加编辑用户信息的逻辑
      }

      // 删除用户
      function deleteUser(userId) {
        if(confirm("确定要删除这个用户吗？")) {
          alert("删除用户ID: " + userId);
          // 这里可以添加删除用户的逻辑
        }
      }

      // 退出登录
      function logout() {
        if(confirm("确定要退出登录吗？")) {
          // 清除本地存储的用户信息
          localStorage.removeItem("userToken");
          localStorage.removeItem("userInfo");
          localStorage.removeItem("userName");
          localStorage.removeItem("passWord");
          localStorage.removeItem("check1");
          localStorage.removeItem("check2");

          // 跳转到登录页面
          window.location.href = "login.html";
        }
      }

      // 显示成功提示
      function showSuccess(message) {
        $("#successMessage").text(message);
        $("#successAlert").show();
        $("#errorAlert").hide();

        // 3秒后自动隐藏
        setTimeout(function() {
          $("#successAlert").hide();
        }, 3000);
      }

      // 显示错误提示
      function showError(message) {
        $("#errorMessage").text(message);
        $("#errorAlert").show();
        $("#successAlert").hide();

        // 5秒后自动隐藏
        setTimeout(function() {
          $("#errorAlert").hide();
        }, 5000);
      }
    </script>
  </body>
</html>
