<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>用户登录 - 管理系统</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="robots" content="all,follow">
    <link rel="stylesheet" href="/assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/pages/auth.css">
  </head>
  <body>
    <div class="page login-page">
      <div class="container d-flex align-items-center">
        <div class="form-holder has-shadow">
          <div class="row">
            <!-- Logo & Information Panel-->
            <div class="col-lg-6">
              <div class="info d-flex align-items-center">
                <div class="content">
                  <div class="logo">
                    <h1>欢迎登录</h1>
                  </div>
                  <p>rag+知识图谱本科智慧教学系统</p>
                </div>
              </div>
            </div>
            <!-- Form Panel    -->
            <div class="col-lg-6 bg-white">
              <div class="form d-flex align-items-center">
                <div class="content">
                  <form method="post" class="form-validate" id="loginForm">
                    <!-- 成功提示 -->
                    <div class="alert alert-success" id="successAlert" role="alert">
                      <span id="successMessage"></span>
                    </div>

                    <!-- 错误提示 -->
                    <div class="alert alert-danger" id="errorAlert" role="alert">
                      <span id="errorMessage"></span>
                    </div>

                    <div class="form-group">
                      <input id="login-username" type="text" name="username" required data-msg="请输入用户名" placeholder="用户名" value="admin" class="input-material">
                    </div>
                    <div class="form-group">
                      <input id="login-password" type="password" name="password" required data-msg="请输入密码" placeholder="密码" class="input-material">
                    </div>
                    <div class="d-flex align-items-center justify-content-between">
                      <button id="loginBtn" type="submit" class="btn btn-primary">
                        <span class="loading">登录中...</span>
                        <span class="normal">登录</span>
                      </button>
                      <div class="d-flex align-items-center">
                        <div class="custom-control custom-checkbox me-3">
                          <input type="checkbox" class="custom-control-input" id="check1">
                          <label class="custom-control-label" for="check1">记住密码</label>
                        </div>
                        <div class="custom-control custom-checkbox">
                          <input type="checkbox" class="custom-control-input" id="check2">
                          <label class="custom-control-label" for="check2">自动登录</label>
                        </div>
                      </div>
                    </div>
                  </form>
                  <br />
                  <small>没有账号?</small><a href="register.html" class="signup">&nbsp;注册</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- JavaScript files-->
    <script src="/assets/vendor/jquery/jquery.min.js"></script>
    <script src="/assets/vendor/jquery/jquery.cookie.min.js"></script>
    <script src="/assets/vendor/bootstrap/bootstrap.min.js"></script>
    <script src="/assets/vendor/jquery-validation/jquery.validate.min.js"></script>
    
    <!-- 核心文件 -->
    <script src="/assets/js/core/config.js"></script>
    <script src="/assets/js/core/utils.js"></script>
    
    <!-- 服务文件 -->
    <script src="/assets/js/services/api.js"></script>
    <script src="/assets/js/services/auth.service.js"></script>
    
    <!-- 页面特定脚本 -->
    <script src="/assets/js/pages/auth/login.js"></script>
    <script>
      // 页面加载完成后初始化
      $(function(){
        // 判断上次是否勾选记住密码和自动登录
        var check1s = localStorage.getItem("check1");
        var check2s = localStorage.getItem("check2");
        var oldName = localStorage.getItem("userName");
        var oldPass = localStorage.getItem("passWord");

        if(check1s == "true"){
          $("#login-username").val(oldName);
          $("#login-password").val(oldPass);
          $("#check1").prop('checked', true);
        } else {
          $("#login-username").val('');
          $("#login-password").val('');
          $("#check1").prop('checked', false);
        }

        if(check2s == "true"){
          $("#check2").prop('checked', true);
          // 自动登录
          if(oldName && oldPass) {
            $("#loginForm").submit();
          }
        } else {
          $("#check2").prop('checked', false);
        }
      });
    </script>
  </body>
</html>
